function join(a,fn){var out=[];a=a||[];for(var i=0;i<a.length;i++)out.push(fn(a[i],i));return out.join('');}
function ids(col,arr){var out=[];arr=arr||[];for(var i=0;i<arr.length;i++){var x=byId(col,arr[i]);if(x)out.push(x);}return out;}
function textOf(item,type){if(type==='lecture'){return [item.title,item.titleTh,item.objective,item.bigIdea,(item.keyTakeaways||[]).map(function(x){return x.t+' '+x.d;}).join(' '),(item.deepDive||[]).join(' ')].join(' ');}if(type==='concept')return [item.name,item.th,item.summary].join(' ');if(type==='case')return [item.company,item.issue].join(' ');if(type==='textbook')return [item.title,(item.keywords||[]).join(' ')].join(' ');return '';}
function filter(items,type){var q=state.query.toLowerCase();var out=[];for(var i=0;i<items.length;i++){var item=items[i];if(state.layer!=='all'){var ok=false;if(type==='lecture')ok=item.layer===state.layer;else{var lecs=item.lectureIds||[];for(var j=0;j<lecs.length;j++){var l=byId('lectures',lecs[j]);if(l&&l.layer===state.layer){ok=true;break;}}}if(!ok)continue;}if(q&&textOf(item,type).toLowerCase().indexOf(q)===-1)continue;out.push(item);}return out;}
function badge(lec){return '<span class="badge '+layerClass(lec.layer)+'">'+esc(layerOf(lec.layer).label)+'</span>';}
function setActive(){var v=document.querySelectorAll('[data-view]');for(var i=0;i<v.length;i++)v[i].classList.toggle('active',v[i].getAttribute('data-view')===state.view);var l=document.querySelectorAll('.layer-filter');for(var j=0;j<l.length;j++)l[j].classList.toggle('active',l[j].getAttribute('data-layer')===state.layer);}
function setCounts(){document.getElementById('count-lectures').textContent=db.lectures.length;document.getElementById('count-concepts').textContent=db.concepts.length;document.getElementById('count-cases').textContent=db.cases.length;document.getElementById('count-textbook').textContent=db.textbookChapters.length;}
function renderDashboard(){var expanded=0;for(var i=0;i<db.lectures.length;i++)if(db.lectures[i].phase)expanded++;root.innerHTML='<section class="hero"><div class="kicker">BA8000 · Phase 2</div><h1>Expanded Content Layer 1</h1><p>Phase 2 เติมเนื้อหาเชิงลึกสำหรับ Lecture 1–4 ซึ่งเป็นฐาน Layer 1: เข้าใจโลก ก่อนต่อไปยัง Layer 2 และ Study Tools</p><div class="stat-grid"><div class="stat"><div class="stat-num">'+db.lectures.length+'</div><div class="stat-label">Lectures</div></div><div class="stat"><div class="stat-num">'+expanded+'</div><div class="stat-label">Expanded Lectures</div></div><div class="stat"><div class="stat-num">'+db.concepts.length+'</div><div class="stat-label">Concepts</div></div><div class="stat"><div class="stat-num">'+db.cases.length+'</div><div class="stat-label">Cases</div></div></div></section><section class="grid">'+join(db.lectures.slice(0,4),cardLecture)+'</section><div class="test-panel" id="test-output">Self-tests: waiting...</div>';}
function cardLecture(lec){return '<button class="card" data-layer="'+esc(lec.layer)+'" onclick="openDetail(\'lecture\',\''+esc(lec.id)+'\')"><div class="card-top">'+badge(lec)+'<span class="card-id">LEC '+String(lec.no).padStart(2,'0')+'</span></div><div class="card-title">'+esc(lec.title)+'</div><div class="card-sub">'+esc(lec.titleTh)+'</div><div class="card-text">'+esc(lec.bigIdea)+'</div><div class="meta-row"><span class="mini">'+(lec.phase?'Expanded':'Stub')+'</span><span class="mini">'+(lec.keyTakeaways?lec.keyTakeaways.length:0)+' takeaways</span><span class="mini">'+(lec.examAngles?lec.examAngles.length:0)+' exam</span></div></button>';}
function cardConcept(c){return '<button class="card" onclick="openDetail(\'concept\',\''+esc(c.id)+'\')"><div class="card-top"><span class="badge layer-1">Concept</span><span class="card-id">'+esc((c.lectureIds||[]).join(', ').replace(/lec-/g,'L'))+'</span></div><div class="card-title">'+esc(c.name)+'</div><div class="card-sub">'+esc(c.th)+'</div><div class="card-text">'+esc(c.summary)+'</div></button>';}
function cardCase(c){return '<button class="card" onclick="openDetail(\'case\',\''+esc(c.id)+'\')"><div class="card-top"><span class="badge layer-3">Case</span><span class="card-id">'+esc((c.lectureIds||[]).join(', ').replace(/lec-/g,'L'))+'</span></div><div class="card-title">'+esc(c.company)+'</div><div class="card-text">'+esc(c.issue)+'</div></button>';}
function cardTextbook(c){return '<button class="card" onclick="openDetail(\'textbook\',\''+esc(c.id)+'\')"><div class="card-top"><span class="badge layer-1">Chapter</span><span class="card-id">CH '+c.no+'</span></div><div class="card-title">'+esc(c.title)+'</div><div class="meta-row">'+join(c.keywords||[],function(k){return '<span class="mini">'+esc(k)+'</span>';})+'</div></button>';}
function renderCollection(view){var map={lectures:['Lectures','lecture',db.lectures,cardLecture],concepts:['Concept Encyclopedia','concept',db.concepts,cardConcept],cases:['Case Bank','case',db.cases,cardCase],textbook:['Textbook Companion','textbook',db.textbookChapters,cardTextbook]};var m=map[view];var items=filter(m[2],m[1]);root.innerHTML='<section class="hero"><div class="kicker">'+esc(m[0])+'</div><h1>'+esc(m[0])+'</h1><p>ค้นหาและกรองข้อมูลจาก Phase 2 database</p><div class="toolbar"><button class="chip '+(state.layer==='all'?'active':'')+'" onclick="openLayer(\'all\')">All</button>'+join(db.layers,function(l){return '<button class="chip '+(state.layer===l.id?'active':'')+'" onclick="openLayer(\''+esc(l.id)+'\')">'+esc(l.label)+'</button>';})+'</div></section>'+(items.length?'<section class="grid">'+join(items,m[3])+'</section>':'<div class="empty">ไม่พบข้อมูล</div>');}
function small(type){return function(item){var title=item.title||item.name||item.company||('Chapter '+item.no);var desc=item.titleTh||item.th||item.summary||item.issue||'';return '<button class="link-card" onclick="openDetail(\''+type+'\',\''+esc(item.id)+'\')"><div class="link-name">'+esc(title)+'</div><div class="link-desc">'+esc(desc)+'</div></button>';};}
function phaseCards(items,tone){if(!items||!items.length)return '<div class="empty">ยังไม่ได้ expand section นี้</div>';return '<div class="phase2-grid">'+join(items,function(x){if(typeof x==='string')return '<div class="phase2-card '+tone+'"><div class="phase2-desc">'+esc(x)+'</div></div>';return '<div class="phase2-card '+tone+'"><div class="phase2-title">'+esc(x.t)+'</div><div class="phase2-desc">'+esc(x.d)+'</div></div>';})+'</div>';}
function phaseList(items){if(!items||!items.length)return '<div class="empty">ยังไม่ได้ expand section นี้</div>';return '<div class="phase2-list">'+join(items,function(x){return '<div class="phase2-item">'+esc(x)+'</div>';})+'</div>';}
function examList(items){if(!items||!items.length)return '<div class="empty">ยังไม่มี exam angle</div>';return '<div class="phase2-list">'+join(items,function(x,i){return '<div class="exam-box"><strong>Q'+(i+1)+'.</strong> '+esc(x)+'</div>';})+'</div>';}
function renderLecture(lec){root.innerHTML='<article class="detail"><header class="detail-head">'+badge(lec)+'<h1 class="detail-title">'+esc(lec.title)+'</h1><p class="detail-sub">'+esc(lec.titleTh)+' · '+esc(lec.objective)+'</p><div class="tabs"><button class="tab active">Overview</button><button class="tab">Deep Dive</button><button class="tab">Exam</button><button class="tab">Cases</button><button class="tab">Sources</button></div></header><div class="detail-body"><div class="section-title">Big Idea</div><p>'+esc(lec.bigIdea)+'</p><div class="section-title">Key Takeaways '+(lec.phase?'· '+esc(lec.phase):'')+'</div>'+phaseCards(lec.keyTakeaways,'')+'<div class="section-title">Deep Dive Notes</div>'+phaseList(lec.deepDive)+'<div class="section-title">Common Misunderstanding</div>'+phaseList(lec.commonMistakes)+'<div class="section-title">Exam Angles</div>'+examList(lec.examAngles)+'<div class="section-title">Discussion Prompts</div>'+phaseCards(lec.discussionPrompts,'teal')+'<div class="section-title">Concepts</div><div class="link-grid">'+join(ids('concepts',lec.conceptIds),small('concept'))+'</div><div class="section-title">Cases</div><div class="link-grid">'+join(ids('cases',lec.caseIds),small('case'))+'</div><div class="section-title">Textbook Connection</div><div class="link-grid">'+join(ids('textbookChapters',lec.textbookChapterIds),small('textbook'))+'</div><div class="section-title">Source Notes</div><div class="phase2-list">'+(lec.sourceNotes?join(lec.sourceNotes,function(x){return '<div class="source-note">'+esc(x)+'</div>';}):'<div class="source-note">to be filled</div>')+'</div></div></article>';}
function renderConcept(c){root.innerHTML='<article class="detail"><header class="detail-head"><span class="badge layer-1">Concept</span><h1 class="detail-title">'+esc(c.name)+'</h1><p class="detail-sub">'+esc(c.th)+'</p></header><div class="detail-body"><div class="section-title">Summary</div><p>'+esc(c.summary)+'</p><div class="section-title">Related Lectures</div><div class="link-grid">'+join(ids('lectures',c.lectureIds),small('lecture'))+'</div><div class="section-title">Related Cases</div><div class="link-grid">'+join(ids('cases',c.caseIds),small('case'))+'</div></div></article>';}
function renderCase(c){root.innerHTML='<article class="detail"><header class="detail-head"><span class="badge layer-3">Case</span><h1 class="detail-title">'+esc(c.company)+'</h1><p class="detail-sub">'+esc(c.issue)+'</p></header><div class="detail-body"><div class="section-title">Concepts Illustrated</div><div class="link-grid">'+join(ids('concepts',c.conceptIds),small('concept'))+'</div><div class="section-title">Related Lectures</div><div class="link-grid">'+join(ids('lectures',c.lectureIds),small('lecture'))+'</div></div></article>';}
function renderTextbook(c){var rel=[];for(var i=0;i<db.lectures.length;i++)if(db.lectures[i].textbookChapterIds.indexOf(c.id)!==-1)rel.push(db.lectures[i]);root.innerHTML='<article class="detail"><header class="detail-head"><span class="badge layer-1">Chapter '+c.no+'</span><h1 class="detail-title">'+esc(c.title)+'</h1><p class="detail-sub">Keywords: '+esc((c.keywords||[]).join(', '))+'</p></header><div class="detail-body"><div class="section-title">Related Lectures</div><div class="link-grid">'+join(rel,small('lecture'))+'</div></div></article>';}
function openDetail(type,id){state.view='detail';state.selectedType=type;state.selectedId=id;setActive();if(type==='lecture')renderLecture(byId('lectures',id));if(type==='concept')renderConcept(byId('concepts',id));if(type==='case')renderCase(byId('cases',id));if(type==='textbook')renderTextbook(byId('textbookChapters',id));window.scrollTo({top:0,behavior:'smooth'});}window.openDetail=openDetail;
function openLayer(layer){state.layer=layer;if(state.view==='dashboard')state.view='lectures';route();}window.openLayer=openLayer;
function route(){setActive();if(state.view==='dashboard')return renderDashboard();if(state.view==='lectures'||state.view==='concepts'||state.view==='cases'||state.view==='textbook')return renderCollection(state.view);if(state.view==='detail')return openDetail(state.selectedType,state.selectedId);}function listeners(){var v=document.querySelectorAll('[data-view]');for(var i=0;i<v.length;i++)v[i].addEventListener('click',function(){state.view=this.getAttribute('data-view');route();});var l=document.querySelectorAll('.layer-filter');for(var j=0;j<l.length;j++)l[j].addEventListener('click',function(){openLayer(this.getAttribute('data-layer'));});searchInput.addEventListener('input',function(){state.query=searchInput.value.trim();if(state.view==='dashboard')state.view='lectures';route();});}
function tests(){var ok=0,total=4;if(db.lectures.length===11)ok++;if(db.lectures[0].keyTakeaways&&db.lectures[3].examAngles)ok++;if(filter(db.concepts,'concept').length>=db.concepts.length)ok++;if(cardLecture(db.lectures[0]).indexOf('LEC 01')!==-1)ok++;var el=document.getElementById('test-output');if(el)el.textContent='Self-tests: '+ok+'/'+total+' passed';if(window.console)console.log('BA8000 Phase 2 tests',ok+'/'+total);}
setCounts();listeners();route();tests();
})();
</script>
</body>
</html>
