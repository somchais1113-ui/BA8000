.container{width:min(1180px,calc(100% - 40px));margin-inline:auto}

.nav-label{font:700 10px/1 var(--mono);letter-spacing:.14em;color:var(--faint);text-transform:uppercase;margin-bottom:9px}

}

.hero p{max-width:820px;color:var(--muted)}

.stat{position:relative;overflow:hidden;padding:16px;border:1px solid var(--line);border-radius:18px;background:rgba(0,0,0,.16);transition:transform .18s,border-color .18s}

.stat:hover::before{transform:translateX(100%)}
.stat-num{font:700 24px/1 var(--mono);margin-bottom:7px}.stat-label{font-size:12px;color:var(--muted)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 24px}
.chip{

}
.chip:hover{transform:translateY(-2px);color:var(--text);background:rgba(255,255,255,.06)}
.chip.active{color:var(--text);border-color:rgba(152,141,255,.38);background:rgba(152,141,255,.14);box-shadow:0 0 24px rgba(152,141,255,.10)}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes softPulse{0%,100%{opacity:.72;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
@keyframes orbitGlow{0%{transform:translate3d(-8%,-8%,0) rotate(0deg)}50%{transform:translate3d(8%,6%,0) rotate(12deg)}100%{transform:translate3d(-8%,-8%,0) rotate(0deg)}}
.hero,.card,.detail{animation:fadeSlideUp .42s cubic-bezier(.2,.8,.2,1) both}
.grid .card:nth-child(1){animation-delay:.02s}.grid .card:nth-child(2){animation-delay:.06s}.grid .card:nth-child(3){animation-delay:.10s}.grid .card:nth-child(4){animation-delay:.14s}.grid .card:nth-child(5){animation-delay:.18s}.grid .card:nth-child(6){animation-delay:.22s}
.card{
  position:relative;isolation:isolate;overflow:hidden;border:1px solid var(--line);border-radius:var(--radius);
  background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.035));
  padding:19px;min-height:160px;box-shadow:0 18px 55px rgba(0,0,0,.18);
  transition:transform .22s cubic-bezier(.2,.8,.2,1),border-color .22s,background .22s,box-shadow .22s;
}
.card::before{content:"";position:absolute;inset:-1px;z-index:-2;background:linear-gradient(135deg,rgba(152,141,255,.22),rgba(68,213,166,.08),rgba(255,134,94,.10));opacity:0;transition:opacity .22s}
.card::after{content:"";position:absolute;width:130px;height:130px;right:-54px;top:-54px;border-radius:50%;background:rgba(255,255,255,.05);transition:transform .28s,opacity .28s;opacity:.75;z-index:-1}

.card:hover::before{opacity:1}.card:hover::after{transform:scale(1.22);opacity:1}.card:active{transform:translateY(-1px) scale(.99)}

.card[data-layer="formulate-strategy"],.card.layer-formulate-strategy{border-color:rgba(68,213,166,.34);background:linear-gradient(180deg,rgba(68,213,166,.12),rgba(255,255,255,.035))}

var state = {view:'dashboard',layer:'all',query:'',selectedId:null,selectedType:null};

function escapeHtml(value){
  return String(value == null ? '' : value).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});
}
function byId(collection,id){
  var list = db[collection] || [];
  for(var i=0;i<list.length;i++){ if(list[i].id === id) return list[i]; }
  return null;
}
function layerOf(id){ return byId('layers',id); }
function layerClass(layerId){ return layerId === 'understand-world' ? 'layer-1' : (layerId === 'formulate-strategy' ? 'layer-2' : 'layer-3'); }
function idsToCards(collection, ids){
  var out = [];
  ids = ids || [];
  for(var i=0;i<ids.length;i++){ var item = byId(collection,ids[i]); if(item) out.push(item); }
  return out;
}
function contains(text,query){ return String(text || '').toLowerCase().indexOf(String(query || '').toLowerCase()) !== -1; }
function joinMap(list, fn){
  var out = [];
  for(var i=0;i<list.length;i++){ out.push(fn(list[i],i)); }
  return out.join('');
}
function joinText(list, fn){
  var out = [];
  for(var i=0;i<list.length;i++){ out.push(fn(list[i],i)); }
  return out.join(' ');
}
function setText(id,value){ var el = document.getElementById(id); if(el) el.textContent = value; }
function setCounts(){
  setText('count-lectures', db.lectures.length);
  setText('count-concepts', db.concepts.length);
  setText('count-frameworks', db.frameworks.length);
  setText('count-cases', db.cases.length);
  setText('count-textbook', db.textbookChapters.length);
}
function setActiveNav(){
  var viewBtns = document.querySelectorAll('[data-view]');
  for(var i=0;i<viewBtns.length;i++){ viewBtns[i].classList.toggle('active', viewBtns[i].getAttribute('data-view') === state.view); }
  var layerBtns = document.querySelectorAll('.layer-filter');
  for(var j=0;j<layerBtns.length;j++){ layerBtns[j].classList.toggle('active', layerBtns[j].getAttribute('data-layer') === state.layer); }
}
function searchableText(item,type){
  if(type === 'lecture'){
    var concepts = joinText(idsToCards('concepts',item.conceptIds),function(x){return x.name + ' ' + x.th;});
    var cases = joinText(idsToCards('cases',item.caseIds),function(x){return x.company + ' ' + x.issue;});
    return [item.title,item.titleTh,item.objective,item.bigIdea,concepts,cases].join(' ');
  }
  if(type === 'concept') return [item.name,item.th,item.summary].join(' ');
  if(type === 'framework') return [item.name,item.summary].join(' ');
  if(type === 'case') return [item.company,item.issue].join(' ');
  if(type === 'textbook') return [item.title,(item.keywords || []).join(' ')].join(' ');
  return '';
}
function filterByLayer(items,type){
  if(state.layer === 'all') return items.slice();
  var out = [];
  for(var i=0;i<items.length;i++){
    var item = items[i];
    if(type === 'lecture'){
      if(item.layer === state.layer) out.push(item);
    }else{
      var lectureIds = item.lectureIds || [];
      for(var j=0;j<lectureIds.length;j++){
        var lec = byId('lectures',lectureIds[j]);
        if(lec && lec.layer === state.layer){ out.push(item); break; }
      }
    }
  }
  return out;
}
function filterByQuery(items,type){
  if(!state.query) return items.slice();
  var out = [];
  for(var i=0;i<items.length;i++){
    if(contains(searchableText(items[i],type),state.query)) out.push(items[i]);
  }
  return out;
}

}

function renderCaseDetail(item){
  if(!item){ app.innerHTML = '<div class="empty">ไม่พบ Case</div>'; return; }
  app.innerHTML = '<article class="detail"><header class="detail-head"><span class="badge layer-3">Case</span><h1 class="detail-title">'+escapeHtml(item.company)+'</h1><p class="detail-sub">'+escapeHtml(item.issue)+'</p></header><div class="detail-body"><div class="section-title">Concepts Illustrated</div><div class="link-grid">'+joinMap(idsToCards('concepts',item.conceptIds || []),renderSmallLink('concept'))+'</div><div class="section-title">Related Lectures</div><div class="link-grid">'+joinMap(idsToCards('lectures',item.lectureIds || []),renderSmallLink('lecture'))+'</div></div></article>';
}
function renderTextbookDetail(chapter){
  if(!chapter){ app.innerHTML = '<div class="empty">ไม่พบ Textbook Chapter</div>'; return; }
  var relatedLectures = [];
  for(var i=0;i<db.lectures.length;i++){ if(db.lectures[i].textbookChapterIds.indexOf(chapter.id) !== -1) relatedLectures.push(db.lectures[i]); }
  var relatedConcepts = [];
  for(var j=0;j<db.concepts.length;j++){ if((db.concepts[j].textbookChapterIds || []).indexOf(chapter.id) !== -1) relatedConcepts.push(db.concepts[j]); }
  app.innerHTML = '<article class="detail"><header class="detail-head"><span class="badge layer-1">Chapter '+chapter.no+'</span><h1 class="detail-title">'+escapeHtml(chapter.title)+'</h1><p class="detail-sub">Keywords: '+escapeHtml(chapter.keywords.join(', '))+'</p></header><div class="detail-body"><div class="section-title">Related Lectures</div><div class="link-grid">'+(joinMap(relatedLectures,renderSmallLink('lecture')) || '<div class="empty">ยังไม่ได้เชื่อม lecture</div>')+'</div><div class="section-title">Related Concepts</div><div class="link-grid">'+(joinMap(relatedConcepts,renderSmallLink('concept')) || '<div class="empty">ยังไม่ได้เชื่อม concept</div>')+'</div></div></article>';
}
function openDetail(type,id){
  state.view = 'detail'; state.selectedId = id; state.selectedType = type;
  setActiveNav(); renderDetail(type,id); window.scrollTo({top:0,behavior:'smooth'});
}
function openLayer(layerId){
  state.layer = layerId;
  if(state.view === 'dashboard') state.view = 'lectures';
  setActiveNav(); route();
}
function route(){
  setActiveNav();
  if(state.view === 'dashboard') return renderDashboard();
  if(state.view === 'lectures' || state.view === 'concepts' || state.view === 'frameworks' || state.view === 'cases' || state.view === 'textbook') return renderCollection(state.view);
  if(state.view === 'detail') return renderDetail(state.selectedType,state.selectedId);
}
function addListeners(){
  var viewBtns = document.querySelectorAll('[data-view]');
  for(var i=0;i<viewBtns.length;i++){
    viewBtns[i].addEventListener('click',function(){ state.view = this.getAttribute('data-view'); state.selectedId = null; route(); window.scrollTo({top:0,behavior:'smooth'}); });
  }
  var layerBtns = document.querySelectorAll('.layer-filter');
  for(var j=0;j<layerBtns.length;j++){
    layerBtns[j].addEventListener('click',function(){ openLayer(this.getAttribute('data-layer')); });
  }
  searchInput.addEventListener('input',function(){ state.query = searchInput.value.trim(); if(state.view === 'dashboard') state.view = 'lectures'; route(); });
}
function runSelfTests(){
  var tests = [];
  function test(name, fn){
    try{ tests.push({name:name, ok:!!fn()}); }
    catch(err){ tests.push({name:name, ok:false, error:err.message}); }
  }
  test('db has 11 lectures',function(){ return db.lectures.length === 11; });
  test('all lecture references resolve',function(){
    for(var i=0;i<db.lectures.length;i++){
      var lec = db.lectures[i];
      var groups = [['concepts',lec.conceptIds],['frameworks',lec.frameworkIds],['cases',lec.caseIds],['textbookChapters',lec.textbookChapterIds]];
      for(var g=0;g<groups.length;g++){
        for(var k=0;k<groups[g][1].length;k++){ if(!byId(groups[g][0],groups[g][1][k])) return false; }
      }
    }
    return true;
  });
  test('search finds risk appetite',function(){ state.query = 'risk appetite'; return filterByQuery(db.concepts,'concept').length > 0; });
  state.query = searchInput.value.trim();
  test('render lecture card returns HTML',function(){ return renderLectureCard(db.lectures[0]).indexOf('LEC 01') !== -1; });
  var passed = 0;
  for(var i=0;i<tests.length;i++){ if(tests[i].ok) passed++; }
  var output = document.getElementById('test-output');
  if(output){ output.textContent = 'Self-tests: '+passed+'/'+tests.length+' passed'; }
  if(window.console){ console.log('BA8000 self-tests',tests); }
}

window.openDetail = openDetail;
window.openLayer = openLayer;

setCounts();
addListeners();
route();
runSelfTests();
})();
</script>
</body>
</html>
